---
env:
  contexts:
    - name: safevault
      urls:
        - http://host.docker.internal:8080
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: replacer
    parameters:
      deleteAllRules: false
    rules:
      # Token injectado em runtime via variável de ambiente ZAP_AUTH_TOKEN.
      # Obter um JWT fresco antes de correr (evita tokens hardcoded/expirados):
      #   export ZAP_AUTH_TOKEN="$(curl -s -X POST http://localhost:8080/api/auth/register \
      #     -H 'Content-Type: application/json' \
      #     -d '{"email":"zap@safevault.io","password":"ZapScan!2026Aa","role":1}' | jq -r .accessToken)"
      - description: BearerJWT
        matchType: REQ_HEADER
        matchString: Authorization
        matchRegex: false
        replacementString: "Bearer ${ZAP_AUTH_TOKEN}"
        initiators: []

  - type: openapi
    parameters:
      apiFile: /zap/wrk/swagger.json
      targetUrl: http://host.docker.internal:8080
      context: safevault

  - type: activeScan
    parameters:
      context: safevault
      policy: Default Policy

  - type: passiveScan-wait
    parameters:
      maxDuration: 0

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk
      reportFile: zap-full-auth-report.html

  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-full-auth-report.json
