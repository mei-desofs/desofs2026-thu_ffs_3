---
env:
  contexts:
    - name: safevault
      urls:
        - http://host.docker.internal:8080
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:
  - type: replacer
    parameters:
      deleteAllRules: false
    rules:
      - description: BearerJWT
        matchType: REQ_HEADER
        matchString: Authorization
        matchRegex: false
        replacementString: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..PevRLmtIxKIBADZOfe6otx7s9Juna3GRw6zsUiBx4-I"
        initiators: []

  - type: openapi
    parameters:
      apiFile: /zap/wrk/swagger.json
      targetUrl: http://host.docker.internal:8080
      context: safevault

  - type: activeScan
    parameters:
      context: safevault
      policy: Default Policy

  - type: passiveScan-wait
    parameters:
      maxDuration: 0

  - type: report
    parameters:
      template: traditional-html
      reportDir: /zap/wrk
      reportFile: zap-full-auth-report.html

  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-full-auth-report.json
