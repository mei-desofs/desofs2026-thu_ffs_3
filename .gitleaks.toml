# Gitleaks configuration for SafeVault
# Docs: https://github.com/gitleaks/gitleaks#configuration

title = "SafeVault Gitleaks Config"

[extend]
# Extend the default ruleset from gitleaks
useDefault = true

# ── Rules to allow (known false positives in this project) ────────────────────
[[allowlists]]
description = "CI test signing keys (non-production, hardcoded intentionally in CI workflows)"
regexes = [
    "CI_SIGNING_KEY_CHANGE_ME_32_CHARS_123456",
    "CI_DAST_SIGNING_KEY_CHANGE_ME_32_CHARS",
    "TestSigningKey_MinimumLength_32Chars",
    "changeme_in_production",
    "changeme_min_32_chars_local_dev_123456",
    "changeme_local_dev_only",
]
paths = [
    ".github/workflows/ci.yml",
    ".github/workflows/release.yml",
    ".github/workflows/dast.yml",
    "tests/",
    ".env.example",
]

[[allowlists]]
description = "DAST (OWASP ZAP) report artifacts — contêm apenas JWTs de teste expirados/efémeros gerados durante o scan, assinados com chaves descartáveis de CI; não são segredos de produção"
paths = [
    '''\.zap/''',
]

[[allowlists]]
description = "Falsos positivos conhecidos: documentação (tokens ilustrativos/truncados), connection string baseada em variáveis de ambiente, e hashes BCrypt de contas de demonstração (não são segredos reais)"
paths = [
    '''Deliverables/''',
    '''docker-compose\.yml''',
    '''docker-compose\..*\.yml''',
    '''src/Infrastructure/seed_demo_data\.sql''',
]

[[allowlists]]
description = "Empty placeholder values in appsettings (empty string is intentional)"
regexes = [
    "\"SigningKey\": \"\"",
    "\"DefaultConnection\": \"\"",
]
paths = [
    "src/InterfaceAdapters/appsettings.json",
    "src/InterfaceAdapters/appsettings.Development.json",
]

# ── Custom rules for .NET / ASP.NET Core secrets ──────────────────────────────
[[rules]]
description = "Hardcoded JWT signing key in C# source"
id = "dotnet-jwt-key"
regex = '''(?i)(signingKey|SigningKey|jwtKey|jwt_key)\s*[=:]\s*["'][A-Za-z0-9+/=_\-\.]{20,}["']'''
severity = "CRITICAL"
tags = ["jwt", "authentication", "credentials"]

[[rules]]
description = "Hardcoded database connection string"
id = "dotnet-connection-string"
regex = '''(?i)(connectionstring|connection_string|DefaultConnection)\s*[=:]\s*["'][^"']{20,}["']'''
severity = "CRITICAL"
tags = ["database", "credentials"]

[[rules]]
description = "Hardcoded password in C# code"
id = "dotnet-password-assignment"
regex = '''(?i)(password|passwd|pwd)\s*=\s*["'][^"']{6,}["']'''
severity = "HIGH"
tags = ["password", "credentials"]
# Allow empty string and clearly non-credential values
allowlists = [
    { description = "Empty or test values", regexes = ["= \"\"", "= ''", "= string.Empty", "placeholder", "example", "test"] }
]

[[rules]]
description = "Hardcoded bcrypt hash (stored hash in code)"
id = "dotnet-bcrypt-hash"
regex = '''\$2[abxy]\$\d{2}\$[./A-Za-z0-9]{53}'''
severity = "MEDIUM"
tags = ["hash", "credentials"]
allowlists = [
    { description = "Test files with example hashes are OK", paths = ["tests/"] }
]
