# docker-compose override para DAST/ZAP local.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.dast.yml up --build
#
# Corre um ZAP *API scan* (não baseline) a partir da spec OpenAPI, na mesma rede
# que a API. Para um scan AUTENTICADO, exportar primeiro um JWT em ZAP_AUTH_TOKEN:
#   export ZAP_AUTH_TOKEN="$(curl -s -X POST http://localhost:8080/api/auth/register \
#     -H 'Content-Type: application/json' \
#     -d '{"email":"zap@safevault.io","password":"ZapScan!2026Aa","role":1}' | jq -r .accessToken)"

services:
  api:
    # Expor em localhost para acesso externo (curl/registo do token)
    ports:
      - "8080:8080"
    networks:
      - backend
      - zap-net

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    depends_on:
      api:
        condition: service_healthy
    environment:
      ZAP_AUTH_TOKEN: ${ZAP_AUTH_TOKEN:-}
    command: >
      zap-api-scan.py
      -t /zap/wrk/.zap/swagger.json -f openapi
      -O http://api:8080
      -c /zap/wrk/.zap/rules.tsv
      -r /zap/wrk/.zap/zap-api-report.html
      -J /zap/wrk/.zap/zap-api-report.json
      -z "replacer.full_list(0).description=auth replacer.full_list(0).enabled=true replacer.full_list(0).matchtype=REQ_HEADER replacer.full_list(0).matchstr=Authorization replacer.full_list(0).regex=false replacer.full_list(0).replacement=Bearer ${ZAP_AUTH_TOKEN}"
      -I
    volumes:
      - .:/zap/wrk:rw
    networks:
      - zap-net

networks:
  zap-net:
    driver: bridge
