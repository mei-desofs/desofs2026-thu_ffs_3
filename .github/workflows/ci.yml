name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  security-events: write
  pull-requests: write

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 1 — build & lint
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: "Stage 1 · Build"
    runs-on: ubuntu-latest
    outputs:
      dotnet-version: "9.0.x"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: |
            **/bin/Release
            **/obj
          key: build-${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────────
  # STAGE 2 — unit + integration tests with coverage
  # ──────────────────────────────────────────────────────────────────────────────
  test:
    name: "Stage 2 · Test & Coverage"
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: safevault_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=safevault_ci;Username=postgres;Password=postgres
      Jwt__Issuer: SafeVault
      Jwt__Audience: SafeVault.Api
      Jwt__SigningKey: CI_SIGNING_KEY_CHANGE_ME_32_CHARS_123456
      ASPNETCORE_ENVIRONMENT: Development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Test with coverage
        run: |
          dotnet test \
            --configuration Release \
            --collect "XPlat Code Coverage" \
            --results-directory TestResults \
            --logger "trx;LogFileName=results.trx" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: TestResults/

      - name: Publish test results summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Unit Test Results"
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

  # ──────────────────────────────────────────────────────────────────────────────
  # STAGE 3 — SCA (Software Composition Analysis)
  # ──────────────────────────────────────────────────────────────────────────────
  sca:
    name: "Stage 3 · SCA"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages
        id: vuln_check
        run: |
          mkdir -p artifacts
          dotnet list package --vulnerable --include-transitive 2>&1 | tee artifacts/sca-report.txt
          if grep -q "has the following vulnerable packages" artifacts/sca-report.txt; then
            echo "::warning::Vulnerable NuGet packages detected — see sca-report.txt artifact"
          fi

      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-report
          path: artifacts/sca-report.txt

  # ──────────────────────────────────────────────────────────────────────────────
  # STAGE 4 — Docker image build validation
  # ──────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: "Stage 4 · Docker Build"
    needs: [test, sca]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: safevault/api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────────
  # STAGE 5 — DAST (authenticated OWASP ZAP API scan against the full stack)
  # Só corre em push para main (é pesado: sobe API + PostgreSQL + ZAP).
  # Em PRs mantém-se rápido; o DAST pode na mesma ser corrido manualmente.
  # ──────────────────────────────────────────────────────────────────────────────
  dast:
    name: "Stage 5 · DAST"
    needs: docker-build
    if: github.event_name == 'push'
    uses: ./.github/workflows/dast.yml
