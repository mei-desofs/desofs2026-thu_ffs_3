name: secret-scan

# Runs on every push and pull request to detect hardcoded credentials,
# API keys, connection strings and other secrets that should be in
# environment variables / GitHub Secrets — not in versioned code.
on:
    push:
        branches: ["main", "develop"]
    pull_request:
        branches: ["main", "develop"]
    schedule:
        # Weekly full-history scan every Monday at 07:00 UTC
        - cron: "0 7 * * 1"

permissions:
    contents: read
    security-events: write # upload SARIF results to GitHub Security tab

jobs:
    gitleaks:
        name: "Secret Scan · Gitleaks"
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  # Fetch full history so Gitleaks can scan all commits
                  fetch-depth: 0

            # O gitleaks-action@v2 exige licença paga em repositórios de organização.
            # A ferramenta gitleaks é open-source e gratuita, por isso corremos o
            # binário diretamente via Docker (sem licença).
            - name: Run Gitleaks (open-source binary, no license required)
              run: |
                  docker run --rm -v "${{ github.workspace }}:/repo" -w /repo \
                    ghcr.io/gitleaks/gitleaks:latest \
                    detect \
                      --source /repo \
                      --config /repo/.gitleaks.toml \
                      --redact \
                      --report-format sarif \
                      --report-path /repo/results.sarif \
                      --exit-code 1 \
                      --verbose

            - name: Upload Gitleaks SARIF to GitHub Security
              if: always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: results.sarif
              continue-on-error: true # SARIF may not exist if no findings

    # ── Additional check: verify no secrets in appsettings files ────────────────
    config-check:
        name: "Secret Scan · Config files audit"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Verify appsettings.json has no hardcoded secrets
              run: |
                  echo "=== Checking appsettings.json for non-empty secrets ==="
                  # Fail if SigningKey or DefaultConnection have real values (not empty strings)
                  SIGNING_KEY=$(jq -r '.Jwt.SigningKey // ""' src/InterfaceAdapters/appsettings.json)
                  CONN_STRING=$(jq -r '.ConnectionStrings.DefaultConnection // ""' src/InterfaceAdapters/appsettings.json)

                  if [ -n "$SIGNING_KEY" ]; then
                    echo "::error::appsettings.json contains a non-empty Jwt.SigningKey — must be empty; inject via environment variable."
                    exit 1
                  fi

                  if [ -n "$CONN_STRING" ]; then
                    echo "::error::appsettings.json contains a non-empty DefaultConnection string — must be empty; inject via environment variable."
                    exit 1
                  fi

                  echo "✅ appsettings.json has no hardcoded secrets."

            - name: Verify appsettings.Development.json has no real secrets
              run: |
                  echo "=== Checking appsettings.Development.json ==="
                  if [ -f src/InterfaceAdapters/appsettings.Development.json ]; then
                    SIGNING_KEY=$(jq -r '.Jwt.SigningKey // ""' src/InterfaceAdapters/appsettings.Development.json)
                    CONN_STRING=$(jq -r '.ConnectionStrings.DefaultConnection // ""' src/InterfaceAdapters/appsettings.Development.json)

                    if [ -n "$SIGNING_KEY" ]; then
                      echo "::error::appsettings.Development.json contains Jwt.SigningKey — use user-secrets or environment variables for local dev."
                      exit 1
                    fi

                    if [ -n "$CONN_STRING" ]; then
                      echo "::error::appsettings.Development.json contains DefaultConnection — use user-secrets or environment variables for local dev."
                      exit 1
                    fi

                    echo "✅ appsettings.Development.json has no hardcoded secrets."
                  else
                    echo "No appsettings.Development.json found — OK."
                  fi

            - name: Search for common secret patterns in source code
              run: |
                  echo "=== Scanning source code for common secret patterns ==="
                  FOUND=0

                  # Check for hardcoded passwords / keys in C# source files
                  if grep -rn --include="*.cs" -E \
                    "(password\s*=\s*\"|Password\s*=\s*\"|SigningKey\s*=\s*\"|connectionString\s*=\s*\"|ConnectionString\s*=\s*\")" \
                    src/ | grep -v "//.*test\|= \"\"\|= string.Empty\|nameof\|throw\|example\|placeholder" ; then
                    echo "::warning::Possible hardcoded credential assignment found in source. Review above lines."
                    FOUND=1
                  fi

                  if [ "$FOUND" -eq 0 ]; then
                    echo "✅ No obvious hardcoded credentials found in src/."
                  fi
