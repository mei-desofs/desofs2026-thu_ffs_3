services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: safevault
      POSTGRES_USER: safevault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safevault"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=safevault;Username=safevault;Password=${POSTGRES_PASSWORD:-changeme_in_production}"
      Jwt__Issuer: SafeVault
      Jwt__Audience: SafeVault.Api
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: 120
      Storage__BasePath: /app/storage
      Iast__Enabled: "true"
      ASPNETCORE_ENVIRONMENT: Docker
    volumes:
      - storage:/app/storage
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

volumes:
  pgdata:
  storage:
  logs:

networks:
  backend:
    driver: bridge
